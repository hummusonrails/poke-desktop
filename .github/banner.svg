<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1018"/>
      <stop offset="50%" stop-color="#0d2a2a"/>
      <stop offset="100%" stop-color="#0b1018"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="50%" stop-color="#58D68D"/>
      <stop offset="100%" stop-color="#2ECC71"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ECC71" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2ECC71" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#2ECC71" stroke-width="0.5" fill="none">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- Top glow -->
  <ellipse cx="640" cy="0" rx="500" ry="200" fill="url(#glow)"/>

  <!-- Accent lines -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#accent)" opacity="0.6"/>
  <rect x="0" y="318" width="1280" height="2" fill="url(#accent)" opacity="0.3"/>

  <!-- Title -->
  <text x="640" y="120" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="48" font-weight="800" letter-spacing="-1.5" fill="#FFFFFF">
    Poke Desktop
  </text>

  <!-- Subtitle -->
  <text x="640" y="170" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="20" font-weight="400" fill="#58D68D">
    Native macOS menu bar app for Poke AI via iMessage
  </text>

  <!-- Tech pills -->
  <g transform="translate(640, 220)" text-anchor="middle"
     font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace"
     font-size="13" font-weight="500">

    <!-- Swift -->
    <rect x="-270" y="-16" width="80" height="30" rx="15" fill="#2ECC71" fill-opacity="0.12" stroke="#2ECC71" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-230" y="5" fill="#58D68D">Swift</text>

    <!-- SwiftUI -->
    <rect x="-170" y="-16" width="90" height="30" rx="15" fill="#2ECC71" fill-opacity="0.12" stroke="#2ECC71" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-125" y="5" fill="#58D68D">SwiftUI</text>

    <!-- SQLite -->
    <rect x="-60" y="-16" width="80" height="30" rx="15" fill="#2ECC71" fill-opacity="0.12" stroke="#2ECC71" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-20" y="5" fill="#58D68D">SQLite</text>

    <!-- iMessage -->
    <rect x="40" y="-16" width="100" height="30" rx="15" fill="#2ECC71" fill-opacity="0.12" stroke="#2ECC71" stroke-opacity="0.25" stroke-width="1"/>
    <text x="90" y="5" fill="#58D68D">iMessage</text>

    <!-- macOS 13+ -->
    <rect x="160" y="-16" width="110" height="30" rx="15" fill="#2ECC71" fill-opacity="0.12" stroke="#2ECC71" stroke-opacity="0.25" stroke-width="1"/>
    <text x="215" y="5" fill="#58D68D">macOS 13+</text>

  </g>
</svg>
