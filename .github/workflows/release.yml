name: Build and Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build release
        run: |
          xcodebuild -scheme PokeDesktop \
            -configuration Release \
            -derivedDataPath build \
            -quiet

      - name: Package release
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/PokeDesktop.app dist/
          cp scripts/install.sh dist/
          cd dist
          tar -czf ../PokeDesktop-${{ github.event.release.tag_name }}-macOS.tar.gz .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: PokeDesktop-${{ github.event.release.tag_name }}-macOS.tar.gz
