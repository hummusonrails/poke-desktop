name: PokeDesktop
options:
  bundleIdPrefix: com.poke
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    branch: main
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0

targets:
  PokeDesktop:
    type: application
    platform: macOS
    sources:
      - path: PokeDesktop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poke.desktop
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: PokeDesktop/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
    dependencies:
      - package: HotKey
      - package: Sparkle
    info:
      path: PokeDesktop/Info.plist
      properties:
        LSUIElement: true
        NSSpeechRecognitionUsageDescription: "Poke Desktop uses speech recognition for voice commands."
        NSMicrophoneUsageDescription: "Poke Desktop needs microphone access for push-to-talk."
        NSAppleEventsUsageDescription: "Poke Desktop sends messages through the Messages app."
        SUFeedURL: https://github.com/hummusonrails/poke-desktop/releases/latest/download/appcast.xml
    scheme:
      testTargets:
        - PokeDesktopTests

  PokeDesktopTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PokeDesktopTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poke.desktop.tests
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: PokeDesktop
